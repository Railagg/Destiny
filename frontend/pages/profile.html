<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destiny - Профиль</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-page {
            padding: 15px;
        }
        
        .profile-header {
            background: linear-gradient(135deg, #e94560 0%, #d13e56 100%);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .profile-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        
        .profile-header.premium {
            background: linear-gradient(135deg, #ffd700, #e6c200);
            color: #000;
        }
        
        .profile-header.legendary {
            background: linear-gradient(135deg, #ff0000, #8b0000);
            animation: glow 2s ease-in-out infinite;
        }
        
        @keyframes glow {
            0% { box-shadow: 0 0 10px rgba(255,0,0,0.5); }
            50% { box-shadow: 0 0 30px rgba(255,0,0,0.8); }
            100% { box-shadow: 0 0 10px rgba(255,0,0,0.5); }
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .profile-avatar {
            width: 80px;
            height: 80px;
            background: #fff;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            border: 3px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }
        
        .profile-avatar.premium {
            border-color: #ffd700;
            animation: rainbow 3s linear infinite;
        }
        
        @keyframes rainbow {
            0% { border-color: #ff0000; }
            20% { border-color: #ffd700; }
            40% { border-color: #00ff00; }
            60% { border-color: #0000ff; }
            80% { border-color: #800080; }
            100% { border-color: #ff0000; }
        }
        
        .profile-name {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 5px;
            position: relative;
            z-index: 1;
        }
        
        .profile-name.premium {
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
        }
        
        .profile-class {
            text-align: center;
            margin-bottom: 5px;
            font-size: 16px;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }
        
        .profile-level {
            text-align: center;
            font-size: 14px;
            background: rgba(0,0,0,0.3);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .profile-titles {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
            position: relative;
            z-index: 1;
        }
        
        .title-badge {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 11px;
            backdrop-filter: blur(5px);
        }
        
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }
        
        .stat-icon-large {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .stat-name {
            color: #ccc;
            font-size: 12px;
            margin-bottom: 5px;
        }
        
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #e94560;
        }
        
        .stat-number.small {
            font-size: 18px;
        }
        
        .progress-section {
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .progress-title {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #ccc;
            font-size: 14px;
        }
        
        .progress-bar {
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ffd700);
            border-radius: 5px;
            width: 45%;
            transition: width 0.3s;
        }
        
        .attributes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .attribute-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .attribute-label {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .attribute-icon {
            font-size: 20px;
        }
        
        .attribute-name {
            font-size: 14px;
            color: #ccc;
        }
        
        .attribute-value {
            font-size: 18px;
            font-weight: bold;
        }
        
        .class-specific-stats {
            background: rgba(233,69,96,0.1);
            border: 1px solid #e94560;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .class-specific-title {
            font-size: 14px;
            color: #e94560;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .class-specific-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        
        .class-specific-item {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
        }
        
        .class-specific-label {
            font-size: 11px;
            color: #ccc;
            margin-bottom: 3px;
        }
        
        .class-specific-value {
            font-size: 16px;
            font-weight: bold;
        }
        
        .badge-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        
        .badge {
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid #e94560;
            border-radius: 25px;
            padding: 8px 15px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .badge-icon {
            font-size: 16px;
        }
        
        .badge.gold {
            background: rgba(255, 215, 0, 0.1);
            border-color: #ffd700;
        }
        
        .badge.purple {
            background: rgba(128, 0, 128, 0.1);
            border-color: #800080;
        }
        
        .badge.rainbow {
            background: linear-gradient(90deg, rgba(255,0,0,0.1), rgba(255,215,0,0.1), rgba(0,255,0,0.1), rgba(0,0,255,0.1), rgba(128,0,128,0.1));
            border-image: linear-gradient(90deg, #ff0000, #ffd700, #00ff00, #0000ff, #800080) 1;
        }
        
        .achievement-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        
        .achievement-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .achievement-item:hover {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }
        
        .achievement-item.completed {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
        }
        
        .achievement-icon {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .achievement-name {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 3px;
        }
        
        .achievement-progress {
            font-size: 10px;
            color: #ccc;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #e94560;
            margin: 20px 0 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid rgba(233, 69, 96, 0.3);
        }
        
        .rainbow-resources {
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
        }
        
        .rainbow-item {
            flex: 1;
            text-align: center;
        }
        
        .rainbow-icon {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .rainbow-label {
            font-size: 11px;
            color: #ccc;
            margin-bottom: 3px;
        }
        
        .rainbow-value {
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(90deg, #ff0000, #ffd700, #00ff00, #0000ff, #800080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .premium-status {
            background: linear-gradient(135deg, #ffd700, #e6c200);
            color: #000;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .premium-status.active {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: #fff;
        }
        
        .premium-icon {
            font-size: 40px;
        }
        
        .premium-info {
            flex: 1;
        }
        
        .premium-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .premium-desc {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .premium-timer {
            font-size: 11px;
            margin-top: 5px;
            opacity: 0.7;
        }
        
        .premium-btn {
            background: #000;
            color: #ffd700;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .premium-btn.active {
            background: #fff;
            color: #4CAF50;
        }
        
        .premium-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .renewal-badge {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 11px;
            margin-top: 5px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="main-screen">
            <div class="top-panel">
                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-icon">⚡</span>
                        <span class="stat-value" id="energy">100/100</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-icon">❤️</span>
                        <span class="stat-value" id="health">100/100</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-icon">💰</span>
                        <span class="stat-value" id="gold">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-icon">🪙</span>
                        <span class="stat-value" id="dstn">0</span>
                    </div>
                </div>
            </div>

            <div class="game-content">
                <div class="profile-page" id="profileContent">
                    <!-- Контент будет загружен динамически -->
                </div>
            </div>

            <div class="bottom-menu">
                <button class="menu-btn" data-page="game">
                    <span class="menu-icon">🎮</span>
                    <span class="menu-text">Игра</span>
                </button>
                <button class="menu-btn" data-page="map">
                    <span class="menu-icon">🗺️</span>
                    <span class="menu-text">Карта</span>
                </button>
                <button class="menu-btn" data-page="inventory">
                    <span class="menu-icon">🎒</span>
                    <span class="menu-text">Инвентарь</span>
                </button>
                <button class="menu-btn active" data-page="profile">
                    <span class="menu-icon">👤</span>
                    <span class="menu-text">Профиль</span>
                </button>
                <button class="menu-btn" data-page="shop">
                    <span class="menu-icon">🏪</span>
                    <span class="menu-text">Магазин</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        let tg = window.Telegram ? window.Telegram.WebApp : null;
        if (tg) {
            tg.expand();
            tg.ready();
        }

        // Класс-специфичные эмодзи
        const CLASS_EMOJI = {
            'warrior': '⚔️',
            'archer': '🏹',
            'mage': '🔮',
            'guardian': '🛡️',
            'paladin': '⚔️✨',
            'rogue': '🗡️',
            'druid': '🌿',
            'warlock': '💀',
            'shaman': '🥁'
        };

        // Названия классов
        const CLASS_NAMES = {
            'warrior': 'Мечник',
            'archer': 'Лучник',
            'mage': 'Маг',
            'guardian': 'Страж',
            'paladin': 'Паладин',
            'rogue': 'Разбойник',
            'druid': 'Друид',
            'warlock': 'Чернокнижник',
            'shaman': 'Шаман'
        };

        // Получение данных игрока
        function getPlayerData() {
            try {
                if (window.opener && window.opener.playerData) {
                    return window.opener.playerData;
                }
                if (window.parent && window.parent.playerData) {
                    return window.parent.playerData;
                }
                const saved = localStorage.getItem('playerData');
                if (saved) {
                    return JSON.parse(saved);
                }
            } catch(e) {
                console.log('Ошибка получения данных:', e);
            }
            return null;
        }

        // Форматирование чисел
        function formatNumber(num) {
            if (num >= 1000000) return (num/1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num/1000).toFixed(1) + 'K';
            return num.toString();
        }

        // Получение цвета для редкости
        function getRarityColor(rarity) {
            const colors = {
                'common': '#808080',
                'uncommon': '#00ff00',
                'rare': '#0000ff',
                'epic': '#800080',
                'legendary': '#ffd700',
                'ancient': '#ff0000',
                'mythic': '#ff00ff'
            };
            return colors[rarity] || '#808080';
        }

        // Рендер профиля
        function renderProfile() {
            const playerData = getPlayerData() || {
                username: 'Игрок',
                level: 1,
                exp: 0,
                max_exp: 1000,
                player_class: 'warrior',
                class_level: 1,
                health: 100,
                max_health: 100,
                energy: 100,
                max_energy: 100,
                gold: 20,
                dstn: 0,
                strength: 1,
                dexterity: 1,
                intelligence: 1,
                vitality: 1,
                damage: 5,
                defense: 0,
                crit_chance: 0,
                dodge_chance: 0,
                luck: 0,
                kills_total: 0,
                pvp_wins: 0,
                items_crafted: 0,
                resources_gathered: 0,
                rainbow_shards: 0,
                rainbow_stones: 0,
                titles: [],
                premium_until: null,
                premium_plan: null,
                renewal_3months: false,
                renewal_6months: false,
                renewal_1year: false,
                renewal_2years: false,
                renewal_3years: false,
                profile_frame: null,
                profile_aura: null,
                paladin_shield: 0,
                stealth: false,
                rage: 0,
                totem_power: 0,
                spirit_power: 0,
                heal_power: 0,
                life_steal: 0,
                curse_power: 0,
                summon_power: 0
            };

            const classEmoji = CLASS_EMOJI[playerData.player_class] || '⚔️';
            const className = CLASS_NAMES[playerData.player_class] || 'Воин';
            
            // Проверка премиум статуса
            const isPremium = playerData.premium_until && new Date(playerData.premium_until) > new Date();
            
            // Проверка наград за верность
            const renewalBadges = [];
            if (playerData.renewal_3months) renewalBadges.push('3м');
            if (playerData.renewal_6months) renewalBadges.push('6м');
            if (playerData.renewal_1year) renewalBadges.push('1г');
            if (playerData.renewal_2years) renewalBadges.push('2г');
            if (playerData.renewal_3years) renewalBadges.push('3г');

            // Вычисление прогресса уровня
            const expNeeded = playerData.level * 1000;
            const expProgress = Math.min(100, (playerData.exp / expNeeded) * 100);

            // Сбор класс-специфичных статов
            const classStats = [];
            if (playerData.paladin_shield > 0) {
                classStats.push({ label: 'Щит паладина', value: playerData.paladin_shield, icon: '🛡️' });
            }
            if (playerData.rage > 0) {
                classStats.push({ label: 'Ярость', value: playerData.rage, icon: '⚡' });
            }
            if (playerData.totem_power > 0) {
                classStats.push({ label: 'Сила тотемов', value: playerData.totem_power, icon: '🥁' });
            }
            if (playerData.spirit_power > 0) {
                classStats.push({ label: 'Сила духов', value: playerData.spirit_power, icon: '👻' });
            }
            if (playerData.heal_power > 0) {
                classStats.push({ label: 'Сила лечения', value: playerData.heal_power, icon: '💚' });
            }
            if (playerData.life_steal > 0) {
                classStats.push({ label: 'Вампиризм', value: playerData.life_steal + '%', icon: '🩸' });
            }
            if (playerData.curse_power > 0) {
                classStats.push({ label: 'Сила проклятий', value: playerData.curse_power, icon: '😈' });
            }
            if (playerData.summon_power > 0) {
                classStats.push({ label: 'Сила призыва', value: playerData.summon_power, icon: '👹' });
            }

            const content = document.getElementById('profileContent');
            
            let html = `
                <!-- Шапка профиля -->
                <div class="profile-header ${isPremium ? 'premium' : ''} ${playerData.profile_aura ? 'legendary' : ''}">
                    <div class="profile-avatar ${isPremium ? 'premium' : ''}">${classEmoji}</div>
                    <div class="profile-name ${isPremium ? 'premium' : ''}">${playerData.username || 'Игрок'}</div>
                    <div class="profile-class">${classEmoji} ${className} • Уровень ${playerData.level}</div>
                    <div class="profile-level">✨ Престиж ${playerData.prestige || 0}</div>
                    
                    <!-- Титулы -->
                    ${playerData.titles && playerData.titles.length > 0 ? `
                        <div class="profile-titles">
                            ${playerData.titles.slice(0, 3).map(title => 
                                `<span class="title-badge">${title}</span>`
                            ).join('')}
                            ${playerData.titles.length > 3 ? `<span class="title-badge">+${playerData.titles.length - 3}</span>` : ''}
                        </div>
                    ` : ''}
                    
                    <!-- Награды за верность -->
                    ${renewalBadges.length > 0 ? `
                        <div class="profile-titles">
                            ${renewalBadges.map(badge => 
                                `<span class="title-badge" style="background: rgba(255,215,0,0.3); border-color: #ffd700;">👑 ${badge}</span>`
                            ).join('')}
                        </div>
                    ` : ''}
                </div>
                
                <!-- Основные статы -->
                <div class="stats-cards">
                    <div class="stat-card">
                        <div class="stat-icon-large">⚔️</div>
                        <div class="stat-name">Урон</div>
                        <div class="stat-number">${playerData.damage || 0}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon-large">🛡️</div>
                        <div class="stat-name">Защита</div>
                        <div class="stat-number">${playerData.defense || 0}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon-large">⚡</div>
                        <div class="stat-name">Крит</div>
                        <div class="stat-number">${playerData.crit_chance || 0}%</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon-large">💨</div>
                        <div class="stat-name">Уклонение</div>
                        <div class="stat-number">${playerData.dodge_chance || 0}%</div>
                    </div>
                </div>
                
                <!-- Радужные ресурсы -->
                <div class="rainbow-resources">
                    <div class="rainbow-item">
                        <div class="rainbow-icon">🌈</div>
                        <div class="rainbow-label">Осколки</div>
                        <div class="rainbow-value">${playerData.rainbow_shards || 0}</div>
                    </div>
                    <div class="rainbow-item">
                        <div class="rainbow-icon">🌟</div>
                        <div class="rainbow-label">Камни</div>
                        <div class="rainbow-value">${playerData.rainbow_stones || 0}</div>
                    </div>
                </div>
                
                <!-- Прогресс уровня -->
                <div class="progress-section">
                    <div class="progress-title">
                        <span>Уровень ${playerData.level} → ${playerData.level + 1}</span>
                        <span>${formatNumber(playerData.exp)} / ${formatNumber(expNeeded)} опыта</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width:${expProgress}%"></div>
                    </div>
                    
                    <!-- Достижения -->
                    <div class="badge-container">
                        <span class="badge"><span class="badge-icon">👾</span> Убито: ${formatNumber(playerData.kills_total || 0)}</span>
                        <span class="badge gold"><span class="badge-icon">⚔️</span> PvP: ${playerData.pvp_wins || 0}</span>
                        <span class="badge purple"><span class="badge-icon">🔨</span> Крафт: ${playerData.items_crafted || 0}</span>
                    </div>
                </div>
                
                <!-- Атрибуты -->
                <div class="section-title">📊 АТРИБУТЫ</div>
                <div class="attributes-grid">
                    <div class="attribute-item">
                        <div class="attribute-label">
                            <span class="attribute-icon">💪</span>
                            <span class="attribute-name">Сила</span>
                        </div>
                        <span class="attribute-value">${playerData.strength || 1}</span>
                    </div>
                    <div class="attribute-item">
                        <div class="attribute-label">
                            <span class="attribute-icon">🏃</span>
                            <span class="attribute-name">Ловкость</span>
                        </div>
                        <span class="attribute-value">${playerData.dexterity || 1}</span>
                    </div>
                    <div class="attribute-item">
                        <div class="attribute-label">
                            <span class="attribute-icon">🧠</span>
                            <span class="attribute-name">Интеллект</span>
                        </div>
                        <span class="attribute-value">${playerData.intelligence || 1}</span>
                    </div>
                    <div class="attribute-item">
                        <div class="attribute-label">
                            <span class="attribute-icon">❤️</span>
                            <span class="attribute-name">Живучесть</span>
                        </div>
                        <span class="attribute-value">${playerData.vitality || 1}</span>
                    </div>
                </div>
                
                <!-- Класс-специфичные статы -->
                ${classStats.length > 0 ? `
                    <div class="class-specific-stats">
                        <div class="class-specific-title">🎯 КЛАССОВЫЕ ОСОБЕННОСТИ</div>
                        <div class="class-specific-grid">
                            ${classStats.map(stat => `
                                <div class="class-specific-item">
                                    <div class="class-specific-label">${stat.icon} ${stat.label}</div>
                                    <div class="class-specific-value">${stat.value}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                ` : ''}
                
                <!-- Статистика -->
                <div class="section-title">📈 СТАТИСТИКА</div>
                <div class="stats-cards">
                    <div class="stat-card">
                        <div class="stat-icon-large">👾</div>
                        <div class="stat-name">Убито мобов</div>
                        <div class="stat-number small">${formatNumber(playerData.kills_total || 0)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon-large">⚔️</div>
                        <div class="stat-name">PvP побед</div>
                        <div class="stat-number small">${playerData.pvp_wins || 0}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon-large">🔨</div>
                        <div class="stat-name">Скрафчено</div>
                        <div class="stat-number small">${playerData.items_crafted || 0}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon-large">📦</div>
                        <div class="stat-name">Собрано</div>
                        <div class="stat-number small">${formatNumber(playerData.resources_gathered || 0)}</div>
                    </div>
                </div>
            `;

            // Премиум статус
            if (isPremium) {
                const premiumUntil = new Date(playerData.premium_until);
                const daysLeft = Math.ceil((premiumUntil - new Date()) / (1000 * 60 * 60 * 24));
                
                html += `
                    <div class="premium-status active">
                        <div class="premium-icon">👑</div>
                        <div class="premium-info">
                            <div class="premium-title">Премиум активен</div>
                            <div class="premium-desc">План: ${playerData.premium_plan || 'Премиум'}</div>
                            <div class="premium-timer">⏳ Осталось: ${daysLeft} дней</div>
                        </div>
                        <button class="premium-btn active" onclick="window.location.href='shop.html?tab=premium'">Продлить</button>
                    </div>
                `;
            } else {
                html += `
                    <div class="premium-status">
                        <div class="premium-icon">👑</div>
                        <div class="premium-info">
                            <div class="premium-title">Премиум не активен</div>
                            <div class="premium-desc">Купи подписку для бонусов</div>
                        </div>
                        <button class="premium-btn" onclick="window.location.href='shop.html?tab=premium'">Купить</button>
                    </div>
                `;
            }

            content.innerHTML = html;
        }

        // Обновление статистики в шапке
        function updateStats() {
            const playerData = getPlayerData();
            if (!playerData) return;

            document.getElementById('energy').textContent = `${playerData.energy || 100}/${playerData.max_energy || 100}`;
            document.getElementById('health').textContent = `${playerData.health || 100}/${playerData.max_health || 100}`;
            document.getElementById('gold').textContent = playerData.gold || 0;
            document.getElementById('dstn').textContent = playerData.dstn || 0;
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            renderProfile();
            updateStats();

            // Слушаем сообщения
            window.addEventListener('message', (event) => {
                if (event.data.type === 'updateStats') {
                    updateStats();
                    renderProfile();
                }
                if (event.data.type === 'updateProfile') {
                    renderProfile();
                }
            });

            // Обработчики меню
            document.querySelectorAll('.menu-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const page = btn.dataset.page;
                    if (page === 'game') window.location.href = 'game.html';
                    else if (page === 'map') window.location.href = 'map.html';
                    else if (page === 'inventory') window.location.href = 'inventory.html';
                    else if (page === 'shop') window.location.href = 'shop.html';
                });
            });
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
