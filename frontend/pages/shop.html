<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destiny - Магазин</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .shop-page {
            padding: 15px;
        }
        
        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .shop-title {
            font-size: 24px;
            font-weight: bold;
            color: #e94560;
        }
        
        .balance-container {
            display: flex;
            gap: 10px;
        }
        
        .balance {
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid #e94560;
            border-radius: 20px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .balance-icon {
            font-size: 18px;
        }
        
        .balance-value {
            font-weight: bold;
            color: #ffd700;
        }
        
        .balance-value.gold {
            color: #ffd700;
        }
        
        .balance-value.dstn {
            color: #e94560;
        }
        
        .balance-value.stars {
            color: #0088cc;
        }
        
        .shop-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        
        .tab-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        
        .tab-btn:hover {
            background: rgba(233, 69, 96, 0.1);
            border-color: #e94560;
        }
        
        .tab-btn.active {
            background: #e94560;
            border-color: #e94560;
        }
        
        .tab-btn.premium {
            border-color: #ffd700;
            color: #ffd700;
        }
        
        .tab-btn.premium:hover {
            background: rgba(255,215,0,0.1);
        }
        
        .tab-btn.premium.active {
            background: #ffd700;
            color: #000;
        }
        
        .shop-section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #e94560;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 2px solid rgba(233, 69, 96, 0.3);
        }
        
        .section-title.premium {
            color: #ffd700;
            border-bottom-color: #ffd700;
        }
        
        .items-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .shop-item-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .shop-item-card:hover {
            border-color: #e94560;
            transform: translateY(-3px);
            background: rgba(233, 69, 96, 0.1);
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.2);
        }
        
        .shop-item-card.premium {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.05);
        }
        
        .shop-item-card.premium:hover {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
        }
        
        .shop-item-card.limited {
            border-color: #4CAF50;
        }
        
        .item-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #e94560;
            color: #fff;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 12px;
            z-index: 2;
        }
        
        .item-badge.premium {
            background: #ffd700;
            color: #000;
        }
        
        .item-badge.sale {
            background: #4CAF50;
        }
        
        .item-badge.limited {
            background: #ff4444;
        }
        
        .item-icon {
            font-size: 40px;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .item-name {
            font-weight: bold;
            font-size: 16px;
            text-align: center;
            margin-bottom: 8px;
        }
        
        .item-rarity {
            font-size: 10px;
            text-align: center;
            margin-bottom: 8px;
        }
        
        .rarity-common { color: #808080; }
        .rarity-uncommon { color: #00ff00; }
        .rarity-rare { color: #0000ff; }
        .rarity-epic { color: #800080; }
        .rarity-legendary { color: #ffd700; }
        .rarity-mythic { color: #ff0000; }
        
        .item-description {
            color: #ccc;
            font-size: 12px;
            text-align: center;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        
        .item-prices {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 10px;
        }
        
        .price-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-size: 14px;
        }
        
        .price-icon {
            font-size: 16px;
        }
        
        .price-value {
            font-weight: bold;
        }
        
        .price-value.stars {
            color: #0088cc;
        }
        
        .price-value.ton {
            color: #0088cc;
        }
        
        .price-value.dstn {
            color: #e94560;
        }
        
        .price-value.gold {
            color: #ffd700;
        }
        
        .price-old {
            text-decoration: line-through;
            color: #999;
            font-size: 12px;
            margin-right: 5px;
        }
        
        .item-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            margin-top: 10px;
            font-size: 11px;
            color: #ccc;
        }
        
        .stat-tag {
            background: rgba(255,255,255,0.1);
            padding: 3px 8px;
            border-radius: 12px;
        }
        
        .stat-tag.good {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
        }
        
        .buy-btn {
            width: 100%;
            background: #e94560;
            border: none;
            color: #fff;
            padding: 10px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .buy-btn:hover {
            background: #d13e56;
            transform: scale(1.02);
        }
        
        .buy-btn.premium {
            background: #ffd700;
            color: #000;
        }
        
        .buy-btn.premium:hover {
            background: #e6c200;
        }
        
        .buy-btn.disabled {
            background: #666;
            cursor: not-allowed;
        }
        
        .buy-btn.disabled:hover {
            transform: none;
        }
        
        .currency-info {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
        }
        
        .currency-item {
            text-align: center;
        }
        
        .currency-icon {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .currency-name {
            font-size: 12px;
            color: #ccc;
            margin-bottom: 3px;
        }
        
        .currency-rate {
            font-size: 11px;
            color: #ffd700;
        }
        
        .premium-badge {
            display: inline-block;
            background: #ffd700;
            color: #000;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 5px;
        }
        
        .discount-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #4CAF50;
            color: #fff;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 12px;
            z-index: 2;
        }
        
        .level-req {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-size: 10px;
            color: #999;
        }
        
        @media (max-width: 600px) {
            .items-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

                            </div>

                    </div>
                    
                    <div class="shop-tabs">
                        <button class="tab-btn active" data-tab="all">Все</button>
                        <button class="tab-btn" data-tab="weapons">⚔️ Оружие</button>
                        <button class="tab-btn" data-tab="armor">🛡️ Броня</button>
                        <button class="tab-btn" data-tab="tools">🛠️ Инструменты</button>
                        <button class="tab-btn" data-tab="consumables">🧪 Зелья</button>
                        <button class="tab-btn" data-tab="bait">🪱 Наживки</button>
                        <button class="tab-btn" data-tab="chests">🎁 Сундуки</button>
                        <button class="tab-btn premium" data-tab="premium">👑 Премиум</button>
                    </div>
                    
                    <!-- Обычный магазин -->
                    <div class="shop-section" id="regularShop">
                        <div class="section-title">⚔️ ОРУЖИЕ</div>
                        <div class="items-grid" id="weaponsGrid"></div>
                        
                        <div class="section-title" style="margin-top:20px;">🛡️ БРОНЯ</div>
                        <div class="items-grid" id="armorGrid"></div>
                        
                        <div class="section-title" style="margin-top:20px;">🛠️ ИНСТРУМЕНТЫ</div>
                        <div class="items-grid" id="toolsGrid"></div>
                        
                        <div class="section-title" style="margin-top:20px;">🧪 ЗЕЛЬЯ</div>
                        <div class="items-grid" id="potionsGrid"></div>
                        
                        <div class="section-title" style="margin-top:20px;">🪱 НАЖИВКИ</div>
                        <div class="items-grid" id="baitGrid"></div>
                        
                        <div class="section-title" style="margin-top:20px;">🎁 СУНДУКИ</div>
                        <div class="items-grid" id="chestsGrid"></div>
                    </div>
                    
                    <!-- Премиум магазин -->
                    <div class="shop-section" id="premiumShop" style="display:none;">
                        <div class="section-title premium">👑 ПРЕМИУМ ТОВАРЫ</div>
                        <div class="items-grid" id="premiumGrid"></div>
                    </div>
                    
                    <!-- Информация о валютах -->
                    <div class="currency-info">
                        <div class="currency-item">
                            <div class="currency-icon">💰</div>
                            <div class="currency-name">Золото</div>
                            <div class="currency-rate">игровая валюта</div>
                        </div>
                        <div class="currency-item">
                            <div class="currency-icon">🪙</div>
                            <div class="currency-name">DSTN</div>
                            <div class="currency-rate">премиум-валюта</div>
                        </div>
                        <div class="currency-item">
                            <div class="currency-icon">⭐</div>
                            <div class="currency-name">Stars</div>
                            <div class="currency-rate">Telegram Stars</div>
                        </div>
                        <div class="currency-item">
                            <div class="currency-icon">💎</div>
                            <div class="currency-name">TON</div>
                            <div class="currency-rate">криптовалюта</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bottom-menu">
                <button class="menu-btn" data-page="game">
                    <span class="menu-icon">🎮</span>
                    <span class="menu-text">Игра</span>
                </button>
                <button class="menu-btn" data-page="map">
                    <span class="menu-icon">🗺️</span>
                    <span class="menu-text">Карта</span>
                </button>
                <button class="menu-btn" data-page="inventory">
                    <span class="menu-icon">🎒</span>
                    <span class="menu-text">Инвентарь</span>
                </button>
                <button class="menu-btn" data-page="profile">
                    <span class="menu-icon">👤</span>
                    <span class="menu-text">Профиль</span>
                </button>
                <button class="menu-btn active" data-page="shop">
                    <span class="menu-icon">🏪</span>
                    <span class="menu-text">Магазин</span>
                </button>
            </div>
        </div>
    </div>

        // Получение данных игрока
        function getPlayerData() {
            try {
                if (window.opener && window.opener.playerData) {
                    return window.opener.playerData;
                }
                if (window.parent && window.parent.playerData) {
                    return window.parent.playerData;
                }
                const saved = localStorage.getItem('playerData');
                if (saved) {
                    return JSON.parse(saved);
                }
            } catch(e) {
                console.log('Ошибка получения данных:', e);
            }
            return playerData;
        }

        // Обновление баланса
        function updateBalance() {
            const data = getPlayerData();
            document.getElementById('gold').textContent = `${data.gold || 0}`;
            document.getElementById('dstn').textContent = data.dstn || 0;
            document.getElementById('goldBalance').textContent = data.gold || 0;
            document.getElementById('dstnBalance').textContent = data.dstn || 0;
            document.getElementById('starsBalance').textContent = data.stars || 0;
        }

        // Форматирование цены
        function formatPrice(item) {
            const prices = [];
            if (item.price_gold) prices.push(`💰 ${item.price_gold}`);
            if (item.price_dstn) prices.push(`🪙 ${item.price_dstn}`);
            if (item.price_stars) prices.push(`⭐ ${item.price_stars}`);
            if (item.price_ton) prices.push(`💎 ${item.price_ton} TON`);
            return prices.join(' • ');
        }

        // Получение цвета редкости
        function getRarityColor(rarity) {
            const colors = {
                'common': '#808080',
                'uncommon': '#00ff00',
                'rare': '#0000ff',
                'epic': '#800080',
                'legendary': '#ffd700',
                'mythic': '#ff0000'
            };
            return colors[rarity] || '#808080';
        }

        // Рендер сетки товаров
        function renderGrid(items, gridId) {
            const grid = document.getElementById(gridId);
            if (!grid) return;
            
            let html = '';
            items.forEach(item => {
                const rarityClass = `rarity-${item.rarity}`;
                const canAffordGold = item.price_gold && playerData.gold >= item.price_gold;
                const canAffordDstn = item.price_dstn && playerData.dstn >= item.price_dstn;
                const canAfford = (!item.price_gold || canAffordGold) && (!item.price_dstn || canAffordDstn);
                
                html += `
                    <div class="shop-item-card ${item.price_stars ? 'premium' : ''} ${!canAfford ? 'disabled' : ''}" 
                         onclick="buyItem('${item.id}', '${item.price_gold ? 'gold' : 'dstn'}')">
                        ${item.limit ? `<span class="item-badge">${item.limit}</span>` : ''}
                        <div class="item-icon">${item.icon}</div>
                        <div class="item-name">${item.name}</div>
                        <div class="item-rarity ${rarityClass}">${item.rarity}</div>
                        <div class="item-description">${item.description}</div>
                        <div class="item-prices">
                            ${item.price_gold ? `
                                <div class="price-row">
                                    <span class="price-icon">💰</span>
                                    <span class="price-value gold">${item.price_gold}</span>
                                </div>
                            ` : ''}
                            ${item.price_dstn ? `
                                <div class="price-row">
                                    <span class="price-icon">🪙</span>
                                    <span class="price-value dstn">${item.price_dstn}</span>
                                </div>
                            ` : ''}
                        </div>
                        ${item.stats ? `
                            <div class="item-stats">
                                ${Object.entries(item.stats).map(([key, value]) => 
                                    `<span class="stat-tag">${key}: +${value}</span>`
                                ).join('')}
                            </div>
                        ` : ''}
                        ${item.level_req ? `<div class="level-req">⚡ ур. ${item.level_req}</div>` : ''}
                        <button class="buy-btn ${!canAfford ? 'disabled' : ''}" 
                                onclick="buyItem('${item.id}', '${item.price_gold ? 'gold' : 'dstn'}'); event.stopPropagation();">
                            ${canAfford ? 'Купить' : 'Недостаточно средств'}
                        </button>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        // Покупка обычного предмета
        function buyItem(itemId, currency) {
            const item = [...shopItems.weapons, ...shopItems.armor, ...shopItems.tools, 
                         ...shopItems.potions, ...shopItems.bait, ...shopItems.chests]
                         .find(i => i.id === itemId);
            
            if (!item) {
                alert('❌ Предмет не найден');
                return;
            }

            const price = currency === 'gold' ? item.price_gold : item.price_dstn;
            
            if (currency === 'gold' && playerData.gold < price) {
                alert(`❌ Недостаточно золота! Нужно ${price}💰`);
                return;
            }
            
            if (currency === 'dstn' && playerData.dstn < price) {
                alert(`❌ Недостаточно DSTN! Нужно ${price}🪙`);
                return;
            }

            if (confirm(`Купить ${item.name} за ${price} ${currency === 'gold' ? '💰' : '🪙'}?`)) {
                // Отправка в бот
                if (tg) {
                    tg.sendData(JSON.stringify({
                        action: 'buy',
                        item_id: itemId,
                        currency: currency,
                        price: price
                    }));
                }
                
                alert(`✅ ${item.name} куплен!`);
                
                // Временное обновление (для демо)
                if (currency === 'gold') {
                    playerData.gold -= price;
                } else {
                    playerData.dstn -= price;
                }
                updateBalance();
                
                // Перерендерить текущую категорию
                const activeTab = document.querySelector('.tab-btn.active').dataset.tab;
                if (activeTab === 'all') {
                    renderAllTabs();
                } else {
                    renderCategory(activeTab);
                }
            }
        }

        // Покупка премиум предмета
        function buyPremium(itemId) {
            const item = shopItems.premium.find(i => i.id === itemId);
            if (!item) {
                alert('❌ Предмет не найден');
                return;
            }

            let price = '';
            if (item.price_stars) price += `${item.price_stars}⭐ `;
            if (item.price_ton) price += `${item.price_ton}💎 `;
            if (item.price_dstn) price += `${item.price_dstn}🪙`;

            if (confirm(`Купить премиум предмет ${item.name} за ${price}?`)) {
                // Отправка в бот
                if (tg) {
                    tg.sendData(JSON.stringify({
                        action: 'buy_premium',
                        item_id: itemId
                    }));
                }
                
                alert(`👑 Премиум предмет ${item.name} куплен!`);
            }
        }

        // Рендер всех категорий
        function renderAllTabs() {
            renderGrid(shopItems.weapons, 'weaponsGrid');
            renderGrid(shopItems.armor, 'armorGrid');
            renderGrid(shopItems.tools, 'toolsGrid');
            renderGrid(shopItems.potions, 'potionsGrid');
            renderGrid(shopItems.bait, 'baitGrid');
            renderGrid(shopItems.chests, 'chestsGrid');
        }

        // Рендер конкретной категории
        function renderCategory(category) {
            const grids = {
                weapons: 'weaponsGrid',
                armor: 'armorGrid',
                tools: 'toolsGrid',
                consumables: 'potionsGrid',
                bait: 'baitGrid',
                chests: 'chestsGrid'
            };

            // Скрываем все секции, показываем только нужную
            document.querySelectorAll('.section-title').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.items-grid').forEach(el => el.style.display = 'none');
            
            if (category === 'all') {
                document.querySelectorAll('.section-title').forEach(el => el.style.display = 'block');
                document.querySelectorAll('.items-grid').forEach(el => el.style.display = 'grid');
                renderAllTabs();
            } else {
                const title = document.querySelector(`.section-title:contains('${getCategoryTitle(category)}')`);
                const grid = document.getElementById(grids[category]);
                if (title) title.style.display = 'block';
                if (grid) {
                    grid.style.display = 'grid';
                    renderGrid(shopItems[category], grids[category]);
                }
            }
        }

        function getCategoryTitle(category) {
            const titles = {
                weapons: '⚔️ ОРУЖИЕ',
                armor: '🛡️ БРОНЯ',
                tools: '🛠️ ИНСТРУМЕНТЫ',
                consumables: '🧪 ЗЕЛЬЯ',
                bait: '🪱 НАЖИВКИ',
                chests: '🎁 СУНДУКИ'
            };
            return titles[category] || '';
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            playerData = getPlayerData();
            updateBalance();
            renderAllTabs();
            renderPremiumGrid();

            // Переключение табов
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    const tab = btn.dataset.tab;
                    if (tab === 'premium') {
                        document.getElementById('regularShop').style.display = 'none';
                        document.getElementById('premiumShop').style.display = 'block';
                    } else {
                        document.getElementById('regularShop').style.display = 'block';
                        document.getElementById('premiumShop').style.display = 'none';
                        renderCategory(tab);
                    }
                });
            });

            // Обработчики меню
            document.querySelectorAll('.menu-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const page = btn.dataset.page;
                    if (page === 'game') window.location.href = 'game.html';
                    else if (page === 'map') window.location.href = 'map.html';
                    else if (page === 'inventory') window.location.href = 'inventory.html';
                    else if (page === 'profile') window.location.href = 'profile.html';
                });
            });

            // Слушаем сообщения
            window.addEventListener('message', (event) => {
                if (event.data.type === 'updateBalance') {
                    playerData = getPlayerData();
                    updateBalance();
                }
            });
        });
