<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Destiny Game</title>
    
    <!-- Подключаем Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Подключаем стили с правильным путем -->
    <link rel="stylesheet" href="/frontend/style.css">
    
    <!-- Подключаем скрипт с правильным путем -->
    <script src="/frontend/script.js" defer></script>
    
    <!-- Дополнительные стили для WebApp -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .app {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: linear-gradient(135deg, #16213e 0%, #1a1a2e 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        /* Статистика сверху */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 14px;
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .stat-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }
        
        /* Основной контент */
        .game-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scrollbar-width: thin;
            scrollbar-color: #e94560 #16213e;
        }
        
        .game-content::-webkit-scrollbar {
            width: 6px;
        }
        
        .game-content::-webkit-scrollbar-track {
            background: #16213e;
        }
        
        .game-content::-webkit-scrollbar-thumb {
            background: #e94560;
            border-radius: 3px;
        }
        
        /* Меню внизу */
        .menu-bar {
            display: flex;
            justify-content: space-around;
            padding: 12px 8px;
            background: rgba(0,0,0,0.4);
            border-top: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        
        .menu-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .menu-btn span {
            font-size: 20px;
            margin-bottom: 4px;
        }
        
        .menu-btn.active {
            color: #e94560;
            background: rgba(233,69,96,0.1);
        }
        
        /* Загрузка */
        .loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f3460, #16213e 100%);
            z-index: 100;
        }
        
        .hidden {
            display: none !important;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }
        
        .loading-text {
            color: #fff;
            font-size: 18px;
            opacity: 0.8;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Уведомления */
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 1000;
            transition: transform 0.3s;
            max-width: 80%;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        .notification.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .notification.error {
            background: #e94560;
        }
        
        .notification.success {
            background: #4caf50;
        }
    </style>
</head>
<body>
    <!-- ЭКРАН ЗАГРУЗКИ -->
    <div id="loading" class="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">Загрузка Destiny...</div>
    </div>

    <!-- ОСНОВНОЙ ЭКРАН ИГРЫ -->
    <div id="mainScreen" class="app hidden">
        <!-- Верхняя панель статистики -->
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-icon">⚡</span>
                <span id="energy">100/100</span>
            </div>
            <div class="stat-item">
                <span class="stat-icon">❤️</span>
                <span id="health">100/100</span>
            </div>
            <div class="stat-item">
                <span class="stat-icon">💰</span>
                <span id="gold">20</span>
            </div>
            <div class="stat-item">
                <span class="stat-icon">🪙</span>
                <span id="dstn">0</span>
            </div>
        </div>

        <!-- Контент игры будет загружаться сюда -->
        <div id="gameContent" class="game-content">
            <!-- Сюда будет подгружаться game.html или страницы из папки pages/ -->
        </div>

        <!-- Нижнее меню -->
        <div class="menu-bar">
            <button class="menu-btn" data-page="game">
                <span>🎮</span>
                <span>Игра</span>
            </button>
            <button class="menu-btn" data-page="map">
                <span>🗺️</span>
                <span>Карта</span>
            </button>
            <button class="menu-btn" data-page="inventory">
                <span>🎒</span>
                <span>Инвентарь</span>
            </button>
            <button class="menu-btn" data-page="profile">
                <span>👤</span>
                <span>Профиль</span>
            </button>
            <button class="menu-btn" data-page="shop">
                <span>🏪</span>
                <span>Магазин</span>
            </button>
        </div>
    </div>

    <!-- Контейнер для уведомлений -->
    <div id="notification"></div>

    <!-- Запасной вариант загрузки game.html -->
    <script>
        // Эта часть выполнится, если script.js не загрузится
        document.addEventListener('DOMContentLoaded', function() {
            // Если через 2 секунды скрипт не загрузился, показываем предупреждение
            setTimeout(function() {
                if (typeof window.loadPage === 'undefined') {
                    console.error('❌ script.js не загрузился');
                    const gameContent = document.getElementById('gameContent');
                    if (gameContent) {
                        gameContent.innerHTML = '<div style="text-align:center; padding:20px; color:#e94560;">Ошибка загрузки игры. Проверьте подключение.</div>';
                    }
                }
            }, 2000);
        });
    </script>
</body>
</html>
